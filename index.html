<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pedido — Tahona por Salvador Márquez</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --azul:#00205C;
  --azul2:#385CAD;
  --oro:#C9A84C;
  --bg:#f0f3f9;
  --white:#fff;
  --ok:#25b46b;
  --error:#d9534f;
  --shadow:0 2px 8px rgba(0,32,92,0.10);
  --radius:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh;padding-bottom:100px;}

/* HEADER */
header{background:var(--azul);position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,32,92,0.4);}
.h-top{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
.h-avatar{width:38px;height:38px;background:var(--oro);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--azul);flex-shrink:0;}
.h-info{flex:1;}
.h-nombre{font-size:14px;font-weight:700;color:#fff;}
.h-sub{font-size:10px;color:rgba(255,255,255,0.6);margin-top:1px;}
.h-fecha{padding:0 14px 12px;}
.h-fecha label{font-size:10px;color:rgba(255,255,255,0.55);display:block;margin-bottom:4px;letter-spacing:.3px;}
.fecha-input{width:100%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:9px 12px;color:#fff;font-size:13px;color-scheme:dark;-webkit-appearance:none;appearance:none;}
.domingo-wrap{display:none;margin-top:8px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.35);border-radius:10px;padding:10px 12px;align-items:center;gap:10px;}
.domingo-wrap.show{display:flex;}
.domingo-wrap label{font-size:11px;color:var(--oro);flex:1;line-height:1.4;}
.toggle{width:42px;height:24px;background:rgba(255,255,255,0.2);border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle.on{background:var(--oro);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}

/* RESUMEN */
.resumen{background:var(--azul2);display:flex;align-items:center;padding:7px 12px;gap:6px;}
.r-item{flex:1;text-align:center;}
.r-val{font-size:16px;font-weight:800;color:#fff;}
.r-lbl{font-size:9px;color:rgba(255,255,255,0.65);margin-top:1px;}
.r-div{width:1px;height:26px;background:rgba(255,255,255,0.18);}
.btn-ver{background:var(--oro);color:var(--azul);border:none;border-radius:8px;padding:7px 13px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-ver:disabled{opacity:.5;cursor:not-allowed;}

/* CONTENIDO */
.container{padding:12px;}

/* BANNER HABITUALES */
.banner-hab{background:linear-gradient(135deg,#00205C,#385CAD);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.banner-hab .b-ico{font-size:24px;flex-shrink:0;}
.banner-hab .b-txt{flex:1;}
.banner-hab .b-titulo{color:#fff;font-size:13px;font-weight:700;}
.banner-hab .b-sub{color:rgba(255,255,255,0.65);font-size:10px;margin-top:2px;}
.banner-hab .b-accion{background:var(--oro);color:var(--azul);border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* SECTION CARD */
.section-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.section-header{background:var(--azul);color:#fff;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.section-header .badge{background:var(--oro);color:var(--azul);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:800;min-width:22px;text-align:center;}
.section-header.hab-header{background:linear-gradient(90deg,#8B4513,#5C3317);}

/* MÁS PRODUCTOS */
.mas-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:11px;font-weight:700;color:var(--azul2);cursor:pointer;border-top:1px dashed #dde3f0;background:#f8faff;letter-spacing:.3px;}
.mas-btn:hover{background:#f0f4ff;}
.mas-btn .ico{transition:transform .2s;}
.mas-btn.abierto .ico{transform:rotate(180deg);}

/* PRODUCT ROW */
.product-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f0f2f8;gap:10px;transition:background .12s;}
.product-row:last-child{border-bottom:none;}
.product-row.active{background:#f0f4ff;}
.product-row.oculto{display:none;}
.product-name{font-size:13px;color:#1a1a2e;flex:1;line-height:1.3;}
.product-row.active .product-name{color:var(--azul);font-weight:600;}
.qty-control{display:flex;align-items:center;flex-shrink:0;}
.qty-btn{width:32px;height:32px;border:1.5px solid var(--azul2);background:var(--white);color:var(--azul2);font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:background .1s;}
.qty-btn:first-child{border-radius:10px 0 0 10px;}
.qty-btn:last-child{border-radius:0 10px 10px 0;}
.qty-btn:active{background:#e8eef8;}
.qty-btn:disabled{opacity:.45;cursor:not-allowed;}
.qty-input{width:40px;height:32px;border:1.5px solid var(--azul2);border-left:none;border-right:none;text-align:center;font-size:14px;font-weight:700;color:var(--azul);background:var(--white);-moz-appearance:textfield;}
.qty-input::-webkit-inner-spin-button,.qty-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.qty-input:focus{outline:none;background:#f0f4ff;}
.qty-input:disabled{opacity:.7;}

/* NOTAS */
.notas-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;padding:14px;box-shadow:var(--shadow);}
.notas-card label{font-size:11px;font-weight:700;color:var(--azul);display:block;margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase;}
.notas-card textarea{width:100%;border:1.5px solid #dde3f0;border-radius:10px;padding:10px 12px;font-size:13px;color:#1a1a2e;resize:none;height:68px;font-family:inherit;}
.notas-card textarea:focus{outline:none;border-color:var(--azul2);}

/* LEYENDA */
.leyenda{border-left:3px solid var(--oro);background:#fffbf0;border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:#5a4a00;margin-bottom:14px;line-height:1.6;}

/* HISTORIAL */
.historial-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.hist-header{background:#f8f9fc;padding:11px 14px;font-size:11px;font-weight:700;color:var(--azul2);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.hist-item{padding:10px 14px;border-bottom:1px solid #f0f2f8;display:flex;justify-content:space-between;align-items:center;}
.hist-item:last-child{border-bottom:none;}
.hist-fecha{font-size:11px;color:#888;}
.hist-prods{font-size:12px;color:#1a1a2e;font-weight:600;}
.btn-repedir{background:var(--azul);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;min-width:240px;max-width:90vw;background:#1a1a2e;color:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.25);font-size:13px;display:none;text-align:center;}
.toast.show{display:block;}
.toast.error{background:var(--error);}
.toast.ok{background:var(--ok);}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--azul);padding:8px 12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 -3px 16px rgba(0,32,92,0.3);z-index:200;}
.b-info{flex:1;color:#fff;}
.b-total{font-size:18px;font-weight:800;}
.b-sub{font-size:10px;opacity:.6;margin-top:1px;}
.btn-borrar{background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:10px;padding:11px 13px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-enviar{background:var(--oro);color:var(--azul);border:none;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .1s;}
.btn-enviar:active{opacity:.85;transform:scale(0.97);}
.btn-enviar:disabled{opacity:.55;cursor:not-allowed;transform:none;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 16px 30px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-strip{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px;}
.modal-ico{text-align:center;font-size:32px;margin-bottom:6px;}
.modal h2{text-align:center;font-size:17px;color:var(--azul);margin-bottom:5px;font-weight:700;}
.modal-fecha{text-align:center;font-size:12px;color:#666;margin-bottom:16px;}
.modal-detalle{background:#f5f8ff;border-radius:12px;padding:12px;margin-bottom:16px;max-height:240px;overflow-y:auto;}
.modal-linea{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid #e8eef8;}
.modal-linea:last-child{border-bottom:none;}
.m-prod{color:#1a1a2e;flex:1;}
.m-cant{font-weight:700;color:var(--azul);background:#e8eef8;padding:2px 8px;border-radius:20px;font-size:12px;}
.btn-confirmar{width:100%;background:var(--azul);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.btn-confirmar:disabled{opacity:.55;cursor:not-allowed;}
.btn-cancelar{width:100%;background:none;border:1.5px solid #dde3f0;border-radius:12px;padding:12px;font-size:14px;color:#888;cursor:pointer;}

/* SCREENS */
.sending-screen,.success-screen{display:none;position:fixed;inset:0;z-index:400;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.sending-screen{background:rgba(0,32,92,0.95);}
.sending-screen.open,.success-screen.open{display:flex;}
.success-screen{background:var(--azul);}
.spinner{width:52px;height:52px;border:4px solid rgba(255,255,255,0.2);border-top-color:var(--oro);border-radius:50%;animation:spin .85s linear infinite;margin-bottom:18px;}
.sending-screen h3{color:#fff;font-size:20px;margin-bottom:6px;}
.sending-screen p{color:rgba(255,255,255,0.7);font-size:13px;}
.s-check{font-size:56px;margin-bottom:16px;}
.success-screen h2{color:#fff;font-size:22px;margin-bottom:10px;}
.success-screen p{color:rgba(255,255,255,0.75);font-size:14px;line-height:1.7;margin-bottom:28px;}
.s-oro{color:var(--oro);font-weight:700;}
.btn-nuevo{background:var(--oro);color:var(--azul);border:none;border-radius:12px;padding:15px 32px;font-size:15px;font-weight:800;cursor:pointer;}

@keyframes spin{to{transform:rotate(360deg);}}

@media(min-width:600px){
  body{background:#e4e8f2;}
  header,.container,.bottom-bar{max-width:440px;margin-left:auto;margin-right:auto;}
  header{border-radius:0 0 16px 16px;}
  .bottom-bar{left:50%;transform:translateX(-50%);border-radius:14px 14px 0 0;}
  .modal-overlay{justify-content:center;align-items:center;}
  .modal{border-radius:20px;max-width:420px;margin:16px;}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="h-top">
    <div class="h-avatar" id="avatar">?</div>
    <div class="h-info">
      <div class="h-nombre" id="nombreCliente">Cargando...</div>
      <div class="h-sub">Pedido de pan</div>
    </div>
  </div>
  <div class="h-fecha">
    <label>Fecha de entrega</label>
    <input type="date" id="fechaEntrega" class="fecha-input">
    <div class="domingo-wrap" id="domingoWrap">
      <label>Este pedido es para el domingo<br><small style="opacity:.8">Se entregará el sábado seleccionado</small></label>
      <div class="toggle" id="domingoToggle" onclick="toggleDomingo()"></div>
    </div>
  </div>
</header>

<div class="resumen">
  <div class="r-item"><div class="r-val" id="rTotal">0</div><div class="r-lbl">Unidades</div></div>
  <div class="r-div"></div>
  <div class="r-item"><div class="r-val" id="rProductos">0</div><div class="r-lbl">Productos</div></div>
  <div class="r-div"></div>
  <div class="r-item"><div class="r-val" id="rFamilias">0</div><div class="r-lbl">Familias</div></div>
  <div class="r-div"></div>
  <button class="btn-ver" id="btnVer" onclick="abrirModal()" disabled>Ver pedido</button>
</div>

<div class="container" id="mainContainer"></div>

<div class="bottom-bar">
  <div class="b-info">
    <div class="b-total" id="bTotal">0 uds</div>
    <div class="b-sub" id="bSub">Sin productos seleccionados</div>
  </div>
  <button class="btn-borrar" onclick="borrarPedido()">🗑 Borrar</button>
  <button class="btn-enviar" id="btnEnviar" onclick="abrirModal()">Enviar pedido</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-strip"></div>
    <div class="modal-ico">📋</div>
    <h2>Confirma tu pedido</h2>
    <div class="modal-fecha" id="modalFecha"></div>
    <div class="modal-detalle" id="modalDetalle"></div>
    <button class="btn-confirmar" id="btnConfirmar" onclick="enviarPedido()">Confirmar y enviar</button>
    <button class="btn-cancelar" id="btnCancelar" onclick="cerrarModal()">Seguir añadiendo</button>
  </div>
</div>

<div class="sending-screen" id="sendingScreen">
  <div class="spinner"></div>
  <h3>Enviando pedido...</h3>
  <p>Registrando en el sistema.</p>
</div>

<div class="success-screen" id="successScreen">
  <div class="s-check">✅</div>
  <h2>¡Pedido enviado!</h2>
  <p>Tu pedido ha sido registrado.<br>Lo recibirás el <span class="s-oro" id="successFecha"></span>.</p>
  <button class="btn-nuevo" onclick="nuevoPedido()">Hacer otro pedido</button>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGYLahIhYRcXaf0nvOqVO_lR-QmcUX1qRq5ArD_o-bJICMlZ9aquo_lRTE8qCVz5Uw/exec';
var MAX_HISTORIAL = 5;

var FAMILIAS = {
  'Bollos':['Bollo Grande','Bollo Grande Picado','Bollo de Pellizco','Bollo Mediano','Bollo Mediano Liado','Bollo Chico','Bollo Chico Liado','Bollo 1/2 Kg','Bollo 1 Kg','Bollo Mini Hostelería','Bollo Mini Hostelería Liado'],
  'Integrales':['Integral Chico','Integral Grande','Integral Multicereales Chico','Integral Multicereales Grande','Integral Nueces Chico','Integral Nueces Grande','Integral Pipas de Calabaza Chico','Integral Pipas de Calabaza Grande','Integral Chico Cuadrado','Integral Grande Cuadrado'],
  'Molletes':['Mollete Chico','Mollete Grande','Mollete Extra','Mollete Chico Cuadrado','Mollete Grande Cuadrado','Yeye Barra 350','Yeye Barra','Yeye','Yeye Mini','Mollete Redondo Extra'],
  'Prieto':['Prieto Chapata Grande','Prieto Pepito Anís','Prieto Pepito Ajonjolí','Prieto Mediano Ajonjolí','Prieto Grande','Prieto Grande Ajonjolí','Prieto Pepito','Prieto Mediano','Prieto Chapata Mediano','Prieto Pepito Mini'],
  'Panadería':['Pan de Pueblo','Barra Rústica','Baguette','Hallulla 500gr','Hallulla Grande Sabores','Hallulla Grande','Hallulla','Pan de Pueblo 1 Kg','Pan de Pueblo 1,5 Kg','Pan de Aceituna'],
  'Especiales':['Brioche Molde','Burguer 150','Burguer 115','Burguer Cerveza','Chatocao 125']
};

// ─── ESTADO ──────────────────────────────────────────────────
var cliente = '';
var cantidades = {};
var esDomingo = false;
var enviando = false;
var toastTimer = null;

// ─── INIT ─────────────────────────────────────────────────────
function init() {
  var params = new URLSearchParams(window.location.search);
  cliente = (params.get('cliente') || '').trim();

  if (!cliente) {
    document.getElementById('nombreCliente').textContent = 'Sin identificar';
    mostrarToast('Usa tu enlace personalizado para hacer pedidos.', 'error');
  } else {
    document.getElementById('nombreCliente').textContent = cliente;
    var ini = cliente.charAt(0).toUpperCase();
    document.getElementById('avatar').textContent = ini;
  }

  generarFechas();
  generarFormulario();
  mostrarHistorial();
  actualizarResumen();
}

// ─── FECHAS ───────────────────────────────────────────────────
function generarFechas() {
  var inp = document.getElementById('fechaEntrega');
  var man = new Date();
  man.setDate(man.getDate() + 1);

  function fmt(d) { return d.toISOString().split('T')[0]; }
  inp.min = fmt(man);
  inp.value = fmt(man);
  bloqueDomingo();

  inp.addEventListener('change', function() {
    var sel = new Date(inp.value + 'T12:00:00');
    if (sel.getDay() === 0) {
      sel.setDate(sel.getDate() + 1);
      inp.value = fmt(sel);
      mostrarToast('Los domingos no hay reparto. Movido al lunes.', 'error');
    }
    bloqueDomingo();
  });
}

function bloqueDomingo() {
  var inp = document.getElementById('fechaEntrega');
  var sel = new Date(inp.value + 'T12:00:00');
  var esSab = sel.getDay() === 6;
  document.getElementById('domingoWrap').classList.toggle('show', esSab);
  if (!esSab) { esDomingo = false; document.getElementById('domingoToggle').classList.remove('on'); }
}

function toggleDomingo() {
  if (enviando) return;
  var inp = document.getElementById('fechaEntrega');
  if (new Date(inp.value + 'T12:00:00').getDay() !== 6) return;
  esDomingo = !esDomingo;
  document.getElementById('domingoToggle').classList.toggle('on', esDomingo);
}

// ─── FORMULARIO ───────────────────────────────────────────────
function generarFormulario() {
  var c = document.getElementById('mainContainer');
  c.innerHTML = '';
  cantidades = {};

  var habituales = obtenerHabituales();

  // Sección habituales
  if (habituales.length > 0) {
    var cardHab = document.createElement('div');
    cardHab.className = 'section-card';

    var hdr = document.createElement('div');
    hdr.className = 'section-header hab-header';
    hdr.innerHTML = '⭐ Tus habituales <span class="badge" id="badge-habituales">0</span>';
    cardHab.appendChild(hdr);

    habituales.forEach(function(p) {
      cantidades[p] = 0;
      var fila = crearFila(p, familiaDeProducto(p), false);
      cardHab.appendChild(fila);
    });

    c.appendChild(cardHab);

    // Banner para mostrar todos
    var banner = document.createElement('div');
    banner.className = 'banner-hab';
    banner.innerHTML = '<div class="b-ico">🍞</div><div class="b-txt"><div class="b-titulo">¿Necesitas algo más?</div><div class="b-sub">Todos los productos disponibles abajo</div></div>';
    c.appendChild(banner);
  }

  // Resto de familias
  Object.keys(FAMILIAS).forEach(function(fam) {
    var prods = FAMILIAS[fam];
    var vis = habituales.length > 0 ? prods.filter(function(p){ return habituales.indexOf(p) === -1; }) : prods;
    var ocu = [];

    if (vis.length === 0 && habituales.length > 0) return;

    var card = document.createElement('div');
    card.className = 'section-card';

    var hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = esc(fam) + ' <span class="badge" id="badge-' + slug(fam) + '">0</span>';
    card.appendChild(hdr);

    // Primeros 4 visibles si hay habituales, sino todos
    var mostrarDirecto = habituales.length > 0 ? vis.slice(0, 4) : vis;
    var enOculto = habituales.length > 0 ? vis.slice(4) : [];

    mostrarDirecto.forEach(function(p) {
      if (!cantidades.hasOwnProperty(p)) cantidades[p] = 0;
      card.appendChild(crearFila(p, fam, false));
    });

    if (enOculto.length > 0) {
      enOculto.forEach(function(p) {
        if (!cantidades.hasOwnProperty(p)) cantidades[p] = 0;
        card.appendChild(crearFila(p, fam, true));
      });

      var masBtn = document.createElement('div');
      masBtn.className = 'mas-btn';
      masBtn.id = 'mb-' + slug(fam);
      masBtn.innerHTML = '<span>+ Más productos de ' + esc(fam) + '</span><span class="ico">▼</span>';
      masBtn.onclick = function() { toggleMas(fam, masBtn); };
      card.appendChild(masBtn);
    }

    c.appendChild(card);
  });

  // Notas
  var notas = document.createElement('div');
  notas.className = 'notas-card';
  notas.innerHTML = '<label>Notas adicionales</label><textarea id="notas" placeholder="Observaciones, cambios o productos especiales..."></textarea>';
  c.appendChild(notas);

  // Leyenda
  var ley = document.createElement('div');
  ley.className = 'leyenda';
  ley.innerHTML = '📌 <strong>Recuerda:</strong> los pedidos se entregan al día siguiente. El pan del domingo se suministra el sábado.';
  c.appendChild(ley);
}

function toggleMas(fam, btn) {
  btn.classList.toggle('abierto');
  var abierto = btn.classList.contains('abierto');
  btn.querySelector('span:first-child').textContent = abierto ? '- Menos productos de ' + fam : '+ Más productos de ' + fam;
  var filas = document.querySelectorAll('[data-fam="' + slug(fam) + '"]');
  filas.forEach(function(f){ f.classList.toggle('oculto', !abierto); });
}

function crearFila(prod, fam, oculto) {
  var row = document.createElement('div');
  row.className = 'product-row' + (oculto ? ' oculto' : '');
  if (oculto) row.dataset.fam = slug(fam);

  var nm = document.createElement('div');
  nm.className = 'product-name';
  nm.textContent = prod;

  var ctrl = document.createElement('div');
  ctrl.className = 'qty-control';

  var bm = document.createElement('button');
  bm.className = 'qty-btn'; bm.type = 'button'; bm.textContent = '−';

  var inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'qty-input'; inp.value = 0; inp.min = 0; inp.inputMode = 'numeric';

  var bp = document.createElement('button');
  bp.className = 'qty-btn'; bp.type = 'button'; bp.textContent = '+';

  bm.onclick = function(){ cambiar(prod, fam, -1, row, inp); };
  bp.onclick = function(){ cambiar(prod, fam,  1, row, inp); };
  inp.onchange = function(){
    var v = Math.max(0, parseInt(inp.value, 10) || 0);
    inp.value = v; cantidades[prod] = v;
    row.classList.toggle('active', v > 0);
    actualizarBadges(fam, prod);
    actualizarResumen();
  };

  ctrl.appendChild(bm); ctrl.appendChild(inp); ctrl.appendChild(bp);
  row.appendChild(nm); row.appendChild(ctrl);
  return row;
}

function cambiar(prod, fam, delta, row, inp) {
  if (enviando) return;
  var v = Math.max(0, (cantidades[prod] || 0) + delta);
  cantidades[prod] = v; inp.value = v;
  row.classList.toggle('active', v > 0);
  actualizarBadges(fam, prod);
  actualizarResumen();
}

function actualizarBadges(fam, prod) {
  // Badge de familia
  var badgeFam = document.getElementById('badge-' + slug(fam));
  if (badgeFam) {
    var totalFam = FAMILIAS[fam].reduce(function(s,p){ return s + (cantidades[p]||0); }, 0);
    badgeFam.textContent = totalFam;
  }
  // Badge habituales
  var badgeHab = document.getElementById('badge-habituales');
  if (badgeHab) {
    var habituales = obtenerHabituales();
    var totalHab = habituales.reduce(function(s,p){ return s + (cantidades[p]||0); }, 0);
    badgeHab.textContent = totalHab;
  }
}

// ─── RESUMEN ──────────────────────────────────────────────────
function actualizarResumen() {
  var lineas = obtenerLineas();
  var totalUds = lineas.reduce(function(s,l){ return s + l[1]; }, 0);
  var fams = {};
  lineas.forEach(function(l){
    var f = familiaDeProducto(l[0]);
    if(f) fams[f] = true;
  });
  var nFams = Object.keys(fams).length;

  document.getElementById('rTotal').textContent = totalUds;
  document.getElementById('rProductos').textContent = lineas.length;
  document.getElementById('rFamilias').textContent = nFams;
  document.getElementById('bTotal').textContent = totalUds + ' uds';
  document.getElementById('bSub').textContent = lineas.length > 0
    ? lineas.length + ' producto' + (lineas.length > 1 ? 's' : '') + ' seleccionado' + (lineas.length > 1 ? 's' : '')
    : 'Sin productos seleccionados';

  var tieneItems = lineas.length > 0;
  document.getElementById('btnVer').disabled = !tieneItems;
}

// ─── HISTORIAL LOCAL ──────────────────────────────────────────
function claveLS() { return 'historial_' + (cliente || 'anonimo'); }
function claveHab() { return 'habituales_' + (cliente || 'anonimo'); }

function obtenerHabituales() {
  try {
    var raw = localStorage.getItem(claveHab());
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function guardarHabituales(lineas) {
  try {
    var freq = {};
    var existentes = obtenerHabituales();
    existentes.forEach(function(p){ freq[p] = (freq[p]||0) + 1; });
    lineas.forEach(function(l){ freq[l[0]] = (freq[l[0]]||0) + 2; });
    var ordenados = Object.keys(freq).sort(function(a,b){ return freq[b]-freq[a]; });
    localStorage.setItem(claveHab(), JSON.stringify(ordenados.slice(0,8)));
  } catch(e) {}
}

function obtenerHistorial() {
  try {
    var raw = localStorage.getItem(claveLS());
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function guardarEnHistorial(lineas, fecha) {
  try {
    var hist = obtenerHistorial();
    hist.unshift({ fecha: fecha, lineas: lineas, ts: Date.now() });
    if (hist.length > MAX_HISTORIAL) hist = hist.slice(0, MAX_HISTORIAL);
    localStorage.setItem(claveLS(), JSON.stringify(hist));
  } catch(e) {}
}

function mostrarHistorial() {
  var hist = obtenerHistorial();
  if (!hist.length) return;

  var card = document.createElement('div');
  card.className = 'historial-card';

  var hdr = document.createElement('div');
  hdr.className = 'hist-header';
  hdr.innerHTML = '🕐 Mis últimos pedidos <span style="font-size:16px">▾</span>';
  var body = document.createElement('div');
  body.id = 'hist-body';
  body.style.display = 'none';
  hdr.onclick = function(){ body.style.display = body.style.display==='none'?'block':'none'; };

  hist.forEach(function(h) {
    var item = document.createElement('div');
    item.className = 'hist-item';
    var prods = h.lineas.slice(0,3).map(function(l){ return l[0] + ' ×' + l[1]; }).join(', ');
    if (h.lineas.length > 3) prods += '...';
    item.innerHTML = '<div><div class="hist-fecha">' + esc(h.fecha) + '</div><div class="hist-prods">' + esc(prods) + '</div></div>';

    var btnRep = document.createElement('button');
    btnRep.className = 'btn-repedir';
    btnRep.textContent = 'Repetir';
    btnRep.onclick = function(){ repetirPedido(h.lineas); };
    item.appendChild(btnRep);
    body.appendChild(item);
  });

  card.appendChild(hdr);
  card.appendChild(body);

  var c = document.getElementById('mainContainer');
  c.insertBefore(card, c.firstChild);
}

function repetirPedido(lineas) {
  borrarPedido();
  lineas.forEach(function(l) {
    var prod = l[0]; var cant = l[1];
    if (cantidades.hasOwnProperty(prod)) {
      cantidades[prod] = cant;
      document.querySelectorAll('.product-name').forEach(function(nm){
        if (nm.textContent === prod) {
          var row = nm.parentElement;
          var inp = row.querySelector('.qty-input');
          if (inp) { inp.value = cant; row.classList.toggle('active', cant > 0); }
        }
      });
    }
  });
  actualizarResumen();
  mostrarToast('Pedido anterior cargado. Revísalo y confirma.', 'ok');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── MODAL ────────────────────────────────────────────────────
function formatFecha() {
  var raw = document.getElementById('fechaEntrega').value;
  if (!raw) return '';
  var parts = raw.split('-');
  var obj = new Date(raw + 'T12:00:00');
  var dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var fmt = dias[obj.getDay()] + ' ' + parseInt(parts[2],10) + ' de ' + meses[parseInt(parts[1],10)-1] + ' de ' + parts[0];
  return esDomingo ? 'Pan domingo — entrega ' + fmt : fmt;
}

function obtenerLineas() {
  return Object.keys(cantidades).filter(function(p){ return cantidades[p] > 0; }).map(function(p){ return [p, cantidades[p]]; });
}

function abrirModal() {
  if (enviando) return;
  var lineas = obtenerLineas();
  if (!lineas.length) { mostrarToast('Añade al menos un producto.', 'error'); return; }
  var fecha = formatFecha();
  if (!fecha) { mostrarToast('Selecciona una fecha de entrega.', 'error'); return; }

  document.getElementById('modalFecha').textContent = 'Entrega: ' + fecha;
  document.getElementById('modalDetalle').innerHTML = lineas.map(function(l){
    return '<div class="modal-linea"><span class="m-prod">' + esc(l[0]) + '</span><span class="m-cant">' + l[1] + ' uds</span></div>';
  }).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function cerrarModal() {
  if (enviando) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ─── ENVÍO ────────────────────────────────────────────────────
function setEnviando(v) {
  enviando = v;
  ['btnEnviar','btnVer','btnConfirmar','btnCancelar'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.disabled = v;
  });
  document.getElementById('sendingScreen').classList.toggle('open', v);
  document.querySelectorAll('.qty-btn').forEach(function(b){ b.disabled = v; });
  document.querySelectorAll('.qty-input').forEach(function(i){ i.disabled = v; });
  var bc = document.getElementById('btnConfirmar');
  if(bc) bc.textContent = v ? 'Enviando...' : 'Confirmar y enviar';
}

function enviarPedido() {
  if (enviando) return;
  var lineas = obtenerLineas();
  if (!lineas.length) { mostrarToast('Añade al menos un producto.', 'error'); return; }
  var fecha = formatFecha();
  if (!fecha) { mostrarToast('Selecciona una fecha válida.', 'error'); return; }

  var notas = (document.getElementById('notas') ? document.getElementById('notas').value : '').trim();
  var payload = {
    cliente: cliente,
    fecha: fecha,
    notas: notas,
    productos: lineas.map(function(l){ return { producto: l[0], cantidad: l[1] }; })
  };

  setEnviando(true);

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    mode: 'no-cors'
  }).then(function() {
    guardarHabituales(lineas);
    guardarEnHistorial(lineas, fecha);
    cerrarModal();
    document.getElementById('successFecha').textContent = fecha;
    document.getElementById('successScreen').classList.add('open');
  }).catch(function(err) {
    console.error(err);
    mostrarToast('Error al enviar. Revisa la conexión e inténtalo de nuevo.', 'error');
  }).finally(function() {
    setEnviando(false);
  });
}

function nuevoPedido() {
  borrarPedido();
  document.getElementById('successScreen').classList.remove('open');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function borrarPedido() {
  Object.keys(cantidades).forEach(function(p){ cantidades[p] = 0; });
  document.querySelectorAll('.qty-input').forEach(function(i){ i.value = 0; });
  document.querySelectorAll('.product-row').forEach(function(r){ r.classList.remove('active'); });
  document.querySelectorAll('.badge').forEach(function(b){ b.textContent = '0'; });
  var n = document.getElementById('notas');
  if (n) n.value = '';
  esDomingo = false;
  document.getElementById('domingoToggle').classList.remove('on');
  actualizarResumen();
}

// ─── UTILIDADES ───────────────────────────────────────────────
function mostrarToast(msg, tipo) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (tipo || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = 'toast'; }, 3200);
}

function familiaDeProducto(prod) {
  var familias = Object.keys(FAMILIAS);
  for (var i = 0; i < familias.length; i++) {
    if (FAMILIAS[familias[i]].indexOf(prod) !== -1) return familias[i];
  }
  return '';
}

function esc(txt) {
  return String(txt||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function slug(txt) {
  return String(txt).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').toLowerCase();
}

// ─── ARRANQUE ─────────────────────────────────────────────────
init();
</script>
