<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pedido — Tahona por Salvador Márquez</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --azul:#00205C;
    --azul2:#385CAD;
    --oro:#C9A84C;
    --bg:#f4f6fb;
    --white:#fff;
    --ok:#25b46b;
    --error:#d9534f;
    --shadow:0 1px 4px rgba(0,32,92,0.08);
  }

  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:var(--bg);
    color:#1a1a2e;
    min-height:100vh;
    padding-bottom:110px;
  }

  header{
    background:var(--azul);
    position:sticky;
    top:0;
    z-index:100;
    box-shadow:0 2px 10px rgba(0,32,92,0.35);
  }

  .header-logo{
    display:flex;
    justify-content:center;
    padding:16px 16px 0;
  }

  .header-logo img{
    height:80px;
    width:auto;
    object-fit:contain;
  }

  .header-cliente{
    background:rgba(0,0,0,0.2);
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .cliente-nombre{
    font-size:14px;
    font-weight:700;
    color:var(--white);
  }

  .cliente-sub{
    font-size:11px;
    color:rgba(255,255,255,0.65);
    margin-top:1px;
  }

  .oro-dot{
    width:8px;
    height:8px;
    background:var(--oro);
    border-radius:50%;
    flex-shrink:0;
  }

  .fecha-wrap{
    padding:10px 16px 14px;
    background:var(--azul);
  }

  .fecha-label{
    font-size:11px;
    color:rgba(255,255,255,0.6);
    margin-bottom:5px;
    letter-spacing:0.3px;
  }

  .fecha-input{
    width:100%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:10px;
    padding:10px 14px;
    color:var(--white);
    font-size:13px;
    -webkit-appearance:none;
    appearance:none;
    color-scheme:dark;
  }

  .domingo-wrap{
    margin-top:8px;
    background:rgba(201,168,76,0.15);
    border:1px solid rgba(201,168,76,0.4);
    border-radius:10px;
    padding:10px 14px;
    display:none;
  }

  .domingo-wrap.show{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .domingo-wrap label{
    font-size:12px;
    color:var(--oro);
    flex:1;
    line-height:1.4;
  }

  .domingo-toggle{
    width:44px;
    height:26px;
    background:rgba(255,255,255,0.2);
    border-radius:13px;
    position:relative;
    cursor:pointer;
    flex-shrink:0;
    transition:background 0.2s;
  }

  .domingo-toggle.on{
    background:var(--oro);
  }

  .domingo-toggle::after{
    content:'';
    position:absolute;
    top:3px;
    left:3px;
    width:20px;
    height:20px;
    background:white;
    border-radius:50%;
    transition:transform 0.2s;
  }

  .domingo-toggle.on::after{
    transform:translateX(18px);
  }

  .resumen-top{
    background:var(--azul2);
    padding:8px 16px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .resumen-top .r-item{
    flex:1;
    text-align:center;
  }

  .resumen-top .r-val{
    font-size:18px;
    font-weight:700;
    color:var(--white);
  }

  .resumen-top .r-lbl{
    font-size:10px;
    color:rgba(255,255,255,0.7);
  }

  .resumen-top .divider{
    width:1px;
    height:28px;
    background:rgba(255,255,255,0.2);
  }

  .container{
    padding:14px;
  }

  .section-card{
    background:var(--white);
    border-radius:14px;
    margin-bottom:12px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  .section-header{
    background:var(--azul);
    color:var(--white);
    padding:11px 16px;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.8px;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .section-header .badge{
    background:var(--oro);
    color:var(--azul);
    border-radius:20px;
    padding:2px 9px;
    font-size:11px;
    font-weight:700;
    min-width:24px;
    text-align:center;
  }

  .product-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:11px 16px;
    border-bottom:1px solid #f0f2f8;
    gap:12px;
    transition:background 0.15s;
  }

  .product-row:last-child{
    border-bottom:none;
  }

  .product-row.active{
    background:#f0f4ff;
  }

  .product-name{
    font-size:14px;
    color:#1a1a2e;
    flex:1;
    line-height:1.3;
  }

  .product-row.active .product-name{
    color:var(--azul);
    font-weight:600;
  }

  .qty-control{
    display:flex;
    align-items:center;
    flex-shrink:0;
  }

  .qty-btn{
    width:34px;
    height:34px;
    border:1.5px solid var(--azul2);
    background:var(--white);
    color:var(--azul2);
    font-size:20px;
    font-weight:300;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    transition:background 0.12s, opacity 0.12s;
  }

  .qty-btn:first-child{
    border-radius:10px 0 0 10px;
  }

  .qty-btn:last-child{
    border-radius:0 10px 10px 0;
  }

  .qty-btn:active{
    background:#e8eef8;
  }

  .qty-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
  }

  .qty-input{
    width:42px;
    height:34px;
    border:1.5px solid var(--azul2);
    border-left:none;
    border-right:none;
    text-align:center;
    font-size:15px;
    font-weight:700;
    color:var(--azul);
    background:var(--white);
    -moz-appearance:textfield;
  }

  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button{
    -webkit-appearance:none;
  }

  .qty-input:focus{
    outline:none;
    background:#f0f4ff;
  }

  .qty-input:disabled{
    opacity:0.7;
  }

  .notas-card{
    background:var(--white);
    border-radius:14px;
    margin-bottom:12px;
    padding:16px;
    box-shadow:var(--shadow);
  }

  .notas-card label{
    font-size:12px;
    font-weight:700;
    color:var(--azul);
    display:block;
    margin-bottom:8px;
    letter-spacing:0.4px;
    text-transform:uppercase;
  }

  .notas-card textarea{
    width:100%;
    border:1.5px solid #dde3f0;
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    color:#1a1a2e;
    resize:none;
    height:76px;
    font-family:inherit;
  }

  .notas-card textarea:focus{
    outline:none;
    border-color:var(--azul2);
  }

  .leyenda{
    border-left:3px solid var(--oro);
    background:#fffbf0;
    border-radius:0 10px 10px 0;
    padding:11px 14px;
    font-size:12px;
    color:#5a4a00;
    margin-bottom:16px;
    line-height:1.6;
  }

  .toast{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
    min-width:240px;
    max-width:90vw;
    background:#1a1a2e;
    color:#fff;
    padding:12px 16px;
    border-radius:12px;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    font-size:14px;
    display:none;
  }

  .toast.show{
    display:block;
  }

  .toast.error{
    background:var(--error);
  }

  .toast.ok{
    background:var(--ok);
  }

  .bottom-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:var(--azul);
    padding:10px 16px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 -2px 12px rgba(0,32,92,0.25);
    z-index:200;
  }

  .bottom-info{
    flex:1;
    color:var(--white);
  }

  .bottom-info .b-total{
    font-size:20px;
    font-weight:700;
  }

  .bottom-info .b-sub{
    font-size:11px;
    opacity:0.65;
    margin-top:1px;
  }

  .btn-enviar{
    background:var(--oro);
    color:var(--azul);
    border:none;
    border-radius:12px;
    padding:14px 22px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
    transition:opacity 0.15s, transform 0.1s;
    letter-spacing:0.2px;
  }

  .btn-enviar:active{
    opacity:0.85;
    transform:scale(0.97);
  }

  .btn-enviar:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
  }

  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:300;
    align-items:flex-end;
  }

  .modal-overlay.open{
    display:flex;
  }

  .modal{
    background:var(--white);
    border-radius:20px 20px 0 0;
    padding:24px 20px 40px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
  }

  .modal-strip{
    width:36px;
    height:4px;
    background:#ddd;
    border-radius:2px;
    margin:0 auto 20px;
  }

  .modal-icon{
    text-align:center;
    font-size:40px;
    margin-bottom:10px;
  }

  .modal h2{
    text-align:center;
    font-size:19px;
    color:var(--azul);
    margin-bottom:6px;
    font-weight:700;
  }

  .modal .modal-fecha{
    text-align:center;
    font-size:13px;
    color:#666;
    margin-bottom:18px;
  }

  .modal-detalle{
    background:#f5f8ff;
    border-radius:12px;
    padding:14px;
    margin-bottom:20px;
    max-height:220px;
    overflow-y:auto;
  }

  .modal-linea{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    padding:5px 0;
    border-bottom:1px solid #e8eef8;
  }

  .modal-linea:last-child{
    border-bottom:none;
  }

  .modal-linea .m-prod{
    color:#1a1a2e;
    flex:1;
  }

  .modal-linea .m-cant{
    font-weight:700;
    color:var(--azul);
    background:#e8eef8;
    padding:2px 8px;
    border-radius:20px;
    font-size:12px;
  }

  .btn-confirmar{
    width:100%;
    background:var(--azul);
    color:var(--white);
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:10px;
  }

  .btn-confirmar:disabled{
    opacity:0.6;
    cursor:not-allowed;
  }

  .btn-cancelar{
    width:100%;
    background:none;
    border:1.5px solid #dde3f0;
    border-radius:12px;
    padding:13px;
    font-size:14px;
    color:#888;
    cursor:pointer;
  }

  .success-screen{
    display:none;
    position:fixed;
    inset:0;
    background:var(--azul);
    z-index:400;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px;
    text-align:center;
  }

  .success-screen.open{
    display:flex;
  }

  .success-screen .s-logo{
    height:70px;
    margin-bottom:28px;
    opacity:0.9;
  }

  .success-screen .s-check{
    font-size:56px;
    margin-bottom:16px;
  }

  .success-screen h2{
    color:var(--white);
    font-size:22px;
    margin-bottom:10px;
  }

  .success-screen p{
    color:rgba(255,255,255,0.75);
    font-size:14px;
    line-height:1.7;
    margin-bottom:32px;
  }

  .success-screen .s-oro{
    color:var(--oro);
    font-weight:700;
  }

  .btn-nuevo{
    background:var(--oro);
    color:var(--azul);
    border:none;
    border-radius:12px;
    padding:15px 32px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
  }

  .sending-screen{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,32,92,0.94);
    z-index:350;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px;
    text-align:center;
  }

  .sending-screen.open{
    display:flex;
  }

  .spinner{
    width:54px;
    height:54px;
    border:4px solid rgba(255,255,255,0.25);
    border-top-color:var(--oro);
    border-radius:50%;
    animation:girar 0.9s linear infinite;
    margin-bottom:18px;
  }

  .sending-screen h3{
    color:#fff;
    font-size:20px;
    margin-bottom:8px;
  }

  .sending-screen p{
    color:rgba(255,255,255,0.75);
    font-size:14px;
    line-height:1.5;
  }

  @keyframes girar{
    to{transform:rotate(360deg);}
  }

  @media(min-width:640px){
    body{background:#e8ecf4;}
    header{max-width:480px;margin:0 auto;border-radius:0 0 16px 16px;}
    .container{max-width:480px;margin:0 auto;}
    .bottom-bar{max-width:480px;left:50%;transform:translateX(-50%);border-radius:16px 16px 0 0;}
    .modal-overlay{justify-content:center;align-items:center;}
    .modal{border-radius:20px;max-width:460px;width:100%;margin:20px;}
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="header-logo">
    <img id="logoImg" src="" alt="Tahona por Salvador Márquez">
  </div>
  <div class="header-cliente">
    <div class="oro-dot"></div>
    <div style="flex:1">
      <div class="cliente-nombre" id="nombreCliente">Cargando...</div>
      <div class="cliente-sub">Pedido de pan</div>
    </div>
  </div>
  <div class="fecha-wrap">
    <div class="fecha-label">Fecha de entrega</div>
    <input type="date" id="fechaEntrega" class="fecha-input">
    <div class="domingo-wrap" id="domingoWrap">
      <label>Este pedido es para el domingo<br><small style="opacity:0.8">Se entrega el sábado seleccionado</small></label>
      <div class="domingo-toggle" id="domingoToggle" onclick="toggleDomingo()"></div>
    </div>
  </div>
</header>

<div class="resumen-top">
  <div class="r-item">
    <div class="r-val" id="rTotal">0</div>
    <div class="r-lbl">Unidades</div>
  </div>
  <div class="divider"></div>
  <div class="r-item">
    <div class="r-val" id="rProductos">0</div>
    <div class="r-lbl">Productos</div>
  </div>
  <div class="divider"></div>
  <div class="r-item">
    <div class="r-val" id="rFamilias">0</div>
    <div class="r-lbl">Familias</div>
  </div>
</div>

<div class="container" id="mainContainer"></div>

<div class="bottom-bar">
  <div class="bottom-info">
    <div class="b-total" id="bTotal">0 uds</div>
    <div class="b-sub" id="bSub">Sin productos seleccionados</div>
  </div>
  <button class="btn-enviar" id="btnEnviar" onclick="abrirModal()">Enviar pedido</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-strip"></div>
    <div class="modal-icon">📋</div>
    <h2>Confirma tu pedido</h2>
    <div class="modal-fecha" id="modalFecha"></div>
    <div class="modal-detalle" id="modalDetalle"></div>
    <button class="btn-confirmar" id="btnConfirmar" onclick="enviarPedido()">Confirmar y enviar</button>
    <button class="btn-cancelar" id="btnCancelar" onclick="cerrarModal()">Revisar pedido</button>
  </div>
</div>

<div class="sending-screen" id="sendingScreen">
  <div class="spinner"></div>
  <h3>Enviando pedido…</h3>
  <p>Estamos registrando tu pedido en el sistema.</p>
</div>

<div class="success-screen" id="successScreen">
  <img class="s-logo" id="successLogo" src="" alt="Logo">
  <div class="s-check">✅</div>
  <h2>¡Pedido enviado!</h2>
  <p id="successMsg">Tu pedido ha sido registrado.<br>Lo recibirás <span class="s-oro" id="successFecha"></span>.</p>
  <button class="btn-nuevo" onclick="nuevoPedido()">Hacer otro pedido</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxbDJV9Ozn1EuZuYner5GJwA5c_odvDgB51k7ulrRcFu4-QtEBim0xkdPOLezgOYE5G/exec';

const LOGO_B64 = 'PEGA_AQUI_TU_BASE64_COMPLETO';

const FAMILIAS = {
  'Bollos':['Bollo Grande','Bollo Grande Picado','Bollo de Pellizco','Bollo Mediano','Bollo Mediano Liado','Bollo Chico','Bollo Chico Liado','Bollo 1/2 Kg','Bollo 1 Kg','Bollo Mini Hostelería','Bollo Mini Hostelería Liado'],
  'Integrales':['Integral Chico','Integral Grande','Integral Multicereales Chico','Integral Multicereales Grande','Integral Nueces Chico','Integral Nueces Grande','Integral Pipas de Calabaza Chico','Integral Pipas de Calabaza Grande','Integral Chico Cuadrado','Integral Grande Cuadrado'],
  'Molletes':['Mollete Chico','Mollete Grande','Mollete Extra','Mollete Chico Cuadrado','Mollete Grande Cuadrado','Yeye Barra 350','Yeye Barra','Yeye','Yeye Mini','Mollete Redondo Extra'],
  'Prieto':['Prieto Chapata Grande','Prieto Pepito Anís','Prieto Pepito Ajonjolí','Prieto Mediano Ajonjolí','Prieto Grande','Prieto Grande Ajonjolí','Prieto Pepito','Prieto Mediano','Prieto Chapata Mediano','Prieto Pepito Mini'],
  'Panadería':['Pan de Pueblo','Barra Rústica','Baguette','Hallulla 500gr','Hallulla Grande Sabores','Hallulla Grande','Hallulla','Pan de Pueblo 1 Kg','Pan de Pueblo 1,5 Kg','Pan de Aceituna'],
  'Especiales':['Brioche Molde','Burguer 150','Burguer 115','Burguer Cerveza','Chatocao 125']
};

let cliente = '';
let cantidades = {};
let esDomingo = false;
let enviando = false;
let toastTimer = null;

function init(){
  document.getElementById('logoImg').src = 'data:image/png;base64,' + LOGO_B64;
  document.getElementById('successLogo').src = 'data:image/png;base64,' + LOGO_B64;

  const params = new URLSearchParams(window.location.search);
  cliente = (params.get('cliente') || 'Cliente').trim();

  document.getElementById('nombreCliente').textContent = cliente || 'Cliente';
  generarFechas();
  generarFormulario();
  actualizarResumen();
}

function mostrarToast(msg, tipo = ''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + tipo;

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.className = 'toast';
  }, 3000);
}

function generarFechas(){
  const inp = document.getElementById('fechaEntrega');
  const hoy = new Date();
  const man = new Date(hoy);
  man.setDate(hoy.getDate() + 1);

  const fmt = d => d.toISOString().split('T')[0];

  inp.min = fmt(man);
  inp.value = fmt(man);
  actualizarBloqueDomingo();

  inp.addEventListener('change', () => {
    const sel = new Date(inp.value + 'T12:00:00');

    if (sel.getDay() === 0) {
      sel.setDate(sel.getDate() + 1);
      inp.value = fmt(sel);
      mostrarToast('Los domingos no hay reparto. Se ha movido al lunes.', 'error');
    }

    actualizarBloqueDomingo();
  });
}

function actualizarBloqueDomingo(){
  const inp = document.getElementById('fechaEntrega');
  const sel = new Date(inp.value + 'T12:00:00');
  const esSabado = sel.getDay() === 6;

  document.getElementById('domingoWrap').classList.toggle('show', esSabado);

  if (!esSabado) {
    esDomingo = false;
    document.getElementById('domingoToggle').classList.remove('on');
  }
}

function toggleDomingo(){
  if (enviando) return;

  const inp = document.getElementById('fechaEntrega');
  const sel = new Date(inp.value + 'T12:00:00');
  if (sel.getDay() !== 6) return;

  esDomingo = !esDomingo;
  document.getElementById('domingoToggle').classList.toggle('on', esDomingo);
}

function generarFormulario(){
  const c = document.getElementById('mainContainer');
  c.innerHTML = '';
  cantidades = {};

  for (const [fam, prods] of Object.entries(FAMILIAS)) {
    const card = document.createElement('div');
    card.className = 'section-card';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = escaparHtml(fam) + '<span class="badge" id="badge-' + slugify(fam) + '">0</span>';
    card.appendChild(hdr);

    for (const p of prods) {
      cantidades[p] = 0;
      card.appendChild(crearFila(p, fam));
    }

    c.appendChild(card);
  }

  const notas = document.createElement('div');
  notas.className = 'notas-card';
  notas.innerHTML = '<label>Notas adicionales</label><textarea id="notas" placeholder="Observaciones, cambios o productos especiales..."></textarea>';
  c.appendChild(notas);

  const ley = document.createElement('div');
  ley.className = 'leyenda';
  ley.innerHTML = '📌 <strong>Recuerda:</strong> los pedidos se entregan al día siguiente. El pan del domingo se suministra el sábado, ya que los domingos no hay reparto.';
  c.appendChild(ley);
}

function crearFila(prod, fam){
  const row = document.createElement('div');
  row.className = 'product-row';

  const nm = document.createElement('div');
  nm.className = 'product-name';
  nm.textContent = prod;

  const ctrl = document.createElement('div');
  ctrl.className = 'qty-control';

  const bm = document.createElement('button');
  bm.className = 'qty-btn';
  bm.type = 'button';
  bm.textContent = '−';

  const inp = document.createElement('input');
  inp.type = 'number';
  inp.className = 'qty-input';
  inp.value = 0;
  inp.min = 0;
  inp.inputMode = 'numeric';

  const bp = document.createElement('button');
  bp.className = 'qty-btn';
  bp.type = 'button';
  bp.textContent = '+';

  bm.onclick = () => cambiar(prod, fam, -1, row, inp);
  bp.onclick = () => cambiar(prod, fam, 1, row, inp);

  inp.onchange = () => {
    const v = Math.max(0, parseInt(inp.value, 10) || 0);
    inp.value = v;
    cantidades[prod] = v;
    row.classList.toggle('active', v > 0);
    actualizarBadge(fam);
    actualizarResumen();
  };

  ctrl.appendChild(bm);
  ctrl.appendChild(inp);
  ctrl.appendChild(bp);

  row.appendChild(nm);
  row.appendChild(ctrl);

  return row;
}

function cambiar(prod, fam, delta, row, inp){
  if (enviando) return;

  const v = Math.max(0, (cantidades[prod] || 0) + delta);
  cantidades[prod] = v;
  inp.value = v;
  row.classList.toggle('active', v > 0);
  actualizarBadge(fam);
  actualizarResumen();
}

function actualizarBadge(fam){
  const total = FAMILIAS[fam].reduce((s, p) => s + (cantidades[p] || 0), 0);
  const b = document.getElementById('badge-' + slugify(fam));
  if (b) b.textContent = total;
}

function actualizarResumen(){
  const lineas = obtenerLineasPedido();
  const totalUds = lineas.reduce((s, [, v]) => s + v, 0);

  const fams = new Set(
    lineas.map(([p]) => {
      for (const [f, ps] of Object.entries(FAMILIAS)) {
        if (ps.includes(p)) return f;
      }
      return '';
    }).filter(Boolean)
  ).size;

  document.getElementById('rTotal').textContent = totalUds;
  document.getElementById('rProductos').textContent = lineas.length;
  document.getElementById('rFamilias').textContent = fams;
  document.getElementById('bTotal').textContent = totalUds + ' uds';
  document.getElementById('bSub').textContent =
    lineas.length > 0
      ? lineas.length + ' producto' + (lineas.length > 1 ? 's' : '')
      : 'Sin productos seleccionados';
}

function formatearFechaEntrega(){
  const fechaRaw = document.getElementById('fechaEntrega').value;
  if (!fechaRaw) return '';

  const [y, m, d] = fechaRaw.split('-');
  const ds = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const ms = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  const fechaObj = new Date(fechaRaw + 'T12:00:00');
  const fechaFmt = ds[fechaObj.getDay()] + ' ' + parseInt(d, 10) + ' de ' + ms[parseInt(m, 10) - 1] + ' ' + y;

  return esDomingo ? 'Pan domingo — entrega ' + fechaFmt : fechaFmt;
}

function obtenerLineasPedido(){
  return Object.entries(cantidades).filter(([, v]) => v > 0);
}

function abrirModal(){
  if (enviando) return;

  if (!cliente) {
    mostrarToast('No se ha detectado el cliente en el enlace.', 'error');
    return;
  }

  const lineas = obtenerLineasPedido();
  if (!lineas.length) {
    mostrarToast('Añade al menos un producto antes de enviar.', 'error');
    return;
  }

  const fecha = formatearFechaEntrega();
  if (!fecha) {
    mostrarToast('Selecciona una fecha de entrega válida.', 'error');
    return;
  }

  document.getElementById('modalFecha').textContent = 'Entrega: ' + fecha;
  document.getElementById('modalDetalle').innerHTML = lineas.map(([p, v]) =>
    '<div class="modal-linea"><span class="m-prod">' + escaparHtml(p) + '</span><span class="m-cant">' + v + ' uds</span></div>'
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function cerrarModal(){
  if (enviando) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

function setEstadoEnvio(activo){
  enviando = activo;

  document.getElementById('btnEnviar').disabled = activo;
  document.getElementById('btnConfirmar').disabled = activo;
  document.getElementById('btnCancelar').disabled = activo;
  document.getElementById('sendingScreen').classList.toggle('open', activo);

  document.querySelectorAll('.qty-btn').forEach(el => el.disabled = activo);
  document.querySelectorAll('.qty-input').forEach(el => el.disabled = activo);

  const fechaInput = document.getElementById('fechaEntrega');
  const notas = document.getElementById('notas');

  if (fechaInput) fechaInput.disabled = activo;
  if (notas) notas.disabled = activo;

  document.getElementById('btnConfirmar').textContent = activo ? 'Enviando...' : 'Confirmar y enviar';
}

async function enviarPedido(){
  if (enviando) return;

  if (!cliente) {
    mostrarToast('No se ha detectado el cliente en el enlace.', 'error');
    return;
  }

  const lineas = obtenerLineasPedido();
  if (!lineas.length) {
    mostrarToast('Añade al menos un producto antes de enviar.', 'error');
    return;
  }

  const fecha = formatearFechaEntrega();
  if (!fecha) {
    mostrarToast('Selecciona una fecha de entrega válida.', 'error');
    return;
  }

  const notas = (document.getElementById('notas')?.value || '').trim();

  const payload = {
    cliente,
    fecha,
    notas,
    productos: lineas.map(([producto, cantidad]) => ({ producto, cantidad }))
  };

  try {
    setEstadoEnvio(true);

    await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      mode:'no-cors'
    });

    cerrarModal();
    document.getElementById('successFecha').textContent = fecha;
    document.getElementById('successScreen').classList.add('open');
    mostrarToast('Pedido enviado correctamente.', 'ok');

  } catch (err) {
    console.error(err);
    mostrarToast('No se pudo enviar el pedido. Revisa la conexión e inténtalo de nuevo.', 'error');
  } finally {
    setEstadoEnvio(false);
  }
}

function nuevoPedido(){
  for (const p in cantidades) cantidades[p] = 0;

  document.querySelectorAll('.qty-input').forEach(i => i.value = 0);
  document.querySelectorAll('.product-row').forEach(r => r.classList.remove('active'));
  document.querySelectorAll('.badge').forEach(b => b.textContent = '0');

  const notas = document.getElementById('notas');
  if (notas) notas.value = '';

  esDomingo = false;
  document.getElementById('domingoToggle').classList.remove('on');

  actualizarResumen();
  document.getElementById('successScreen').classList.remove('open');
  actualizarBloqueDomingo();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escaparHtml(txt){
  return String(txt)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function slugify(txt){
  return String(txt)
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, '-')
    .toLowerCase();
}

init();
</script>
